<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>𝓑𝓘𝓐𝓝 𝓢𝓽𝓾𝓭𝓲𝓸 · 账户精简版</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    /* ========== 全局重置 ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #f7f0fc 0%, #ffeef5 40%, #ecf3fe 100%);
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      color: #2e3440;
    }

    /* 顶部彩虹条带 */
    .rainbow-stripe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, 
        #ff6b6b, #ffb347, #ffee6b, #6bff6b, #6bb5ff, #b56bff, #ff6bb5);
      background-size: 200% 100%;
      animation: rainbowFlow 6s linear infinite;
      z-index: 999;
      box-shadow: 0 0 12px rgba(255,200,200,0.6);
      pointer-events: none;
    }

    @keyframes rainbowFlow {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    /* 背景光晕 */
    .glow-lite-1, .glow-lite-2 {
      position: fixed;
      z-index: 0;
      pointer-events: none;
    }
    .glow-lite-1 {
      width: 70vmax;
      height: 70vmax;
      background: radial-gradient(circle at 30% 40%, #fbc4d5, #c7d9fe, transparent 70%);
      filter: blur(110px);
      opacity: 0.25;
      top: -15vh;
      left: -10vw;
    }
    .glow-lite-2 {
      width: 80vmin;
      height: 80vmin;
      background: #fde4c2;
      filter: blur(130px);
      opacity: 0.2;
      bottom: 5vh;
      right: -5vw;
    }

    /* 主毛玻璃卡片 */
    .glass-card {
      position: relative;
      z-index: 20;
      background: rgba(255, 250, 245, 0.3);
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 64px;
      padding: 2.2rem 2.8rem 2.5rem;
      max-width: 920px;
      width: 100%;
      box-shadow: 0 20px 40px -16px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.4) inset;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
      animation: cardFloatIn 0.6s ease-out;
    }
    @keyframes cardFloatIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .glass-card:hover {
      box-shadow: 0 30px 60px -20px rgba(120, 100, 150, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.7) inset;
      transform: scale(1.002);
    }

    /* 标题行 */
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem 0.5rem;
      margin-bottom: 1.2rem;
    }
    h1 {
      font-size: 3.8rem;
      font-weight: 400;
      color: #2e293a;
      text-shadow: 0 2px 6px rgba(255, 255, 255, 0.7);
      letter-spacing: 2px;
      line-height: 1.2;
    }
    h1 span {
      white-space: nowrap;
    }
    .title-gap {
      display: inline-block;
      width: 0.6rem;
    }

    /* 地球语言选择器 + 账户图标 */
    .action-icons {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }
    .lang-dropdown {
      position: relative;
      display: inline-block;
    }
    .lang-btn-globe, .account-icon {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 60px;
      padding: 0.5rem 1.2rem;
      font-size: 1.2rem;
      font-weight: 500;
      color: #3a2e45;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }
    .account-icon {
      padding: 0.5rem 1rem;
      font-size: 1.4rem;
    }
    .lang-btn-globe i, .account-icon i {
      font-size: 1.4rem;
      color: #8875a0;
    }
    .lang-btn-globe:hover, .account-icon:hover {
      background: rgba(255,255,255,0.9);
      border-color: #e0c8e0;
      transform: translateY(-2px);
    }
    .lang-options {
      position: absolute;
      top: 115%;
      right: 0;
      background: rgba(255, 250, 245, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 40px;
      padding: 0.6rem 0.3rem;
      min-width: 130px;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      box-shadow: 0 16px 30px -12px rgba(90,60,80,0.3);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: 0.2s ease;
      z-index: 100;
    }
    .lang-options.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .lang-option {
      background: transparent;
      border: none;
      padding: 0.6rem 1.6rem;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 500;
      color: #2e293a;
      cursor: pointer;
      transition: 0.15s;
      text-align: left;
      width: 100%;
    }
    .lang-option:hover {
      background: rgba(255, 255, 255, 0.6);
      color: #1a1528;
    }
    .lang-option.active-lang {
      background: rgba(255, 215, 235, 0.5);
      color: #5b416b;
      font-weight: 600;
    }

    /* 通告栏 */
    .notice-board {
      background: rgba(250, 240, 245, 0.45);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 235, 240, 0.8);
      border-radius: 48px;
      padding: 1.2rem 1.8rem;
      margin: 1rem 0 2rem 0;
      font-size: 1rem;
      color: #4d4055;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      box-shadow: 0 4px 12px rgba(180,140,160,0.1);
    }
    .notice-board i {
      font-size: 2rem;
      color: #bb99aa;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }
    .notice-text {
      line-height: 1.6;
      text-align: left;
      word-break: break-word;
    }
    .notice-text strong {
      color: #a35c7a;
      font-weight: 600;
    }

    /* 副标题 */
    .tagline {
      font-size: 1.3rem;
      color: #4a4455;
      margin-bottom: 2.2rem;
      font-weight: 350;
      border-bottom: 1px dashed rgba(110, 100, 130, 0.25);
      padding-bottom: 1rem;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .tagline i {
      color: #ac92b0;
      font-size: 1.1rem;
    }
    .dynamic-text {
      transition: opacity 0.2s;
    }

    /* 双栏卡片 */
    .sections-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.8rem;
      margin: 2rem 0 1.2rem;
      justify-content: center;
    }
    .info-card {
      flex: 1 1 240px;
      background: rgba(255, 245, 250, 0.4);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 240, 245, 0.7);
      border-radius: 48px;
      padding: 1.6rem 1.5rem;
      text-align: left;
      box-shadow: 0 6px 16px rgba(150,120,140,0.1);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .info-card::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -30%;
      width: 160%;
      height: 160%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), transparent 70%);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }
    .info-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 20px 30px -12px rgba(170, 130, 160, 0.3);
      border-color: rgba(255, 220, 235, 0.9);
    }
    .info-card:hover::before {
      opacity: 0.6;
    }
    .info-card h3 {
      font-size: 1.4rem;
      font-weight: 450;
      margin-bottom: 1.2rem;
      color: #5d4765;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      border-bottom: 1px dotted rgba(130,100,120,0.3);
      padding-bottom: 0.5rem;
    }
    .info-card h3 i {
      font-size: 1.4rem;
      color: #b385a5;
    }
    .works-list, .contact-list {
      list-style: none;
    }
    .works-list li, .contact-list li {
      margin-bottom: 0.8rem;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      transition: transform 0.15s;
    }
    .works-list li:hover, .contact-list li:hover {
      transform: translateX(5px);
    }
    .works-list i, .contact-list i {
      width: 1.8rem;
      color: #b38faa;
      font-size: 1.2rem;
    }
    .works-list a, .contact-list a {
      color: #3f354a;
      text-decoration: none;
      border-bottom: 1px dotted transparent;
      transition: border 0.15s;
    }
    .works-list a:hover, .contact-list a:hover {
      border-bottom: 1px dotted #a57894;
    }

    /* 脚注 */
    .foot-lite {
      color: rgba(70, 60, 80, 0.6);
      font-size: 1rem;
      margin-top: 1.8rem;
      font-weight: 320;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
    .foot-lite i {
      color: #bd9ebe;
    }

    /* ========== 账户模态框样式 (精简，无主题/检测) ========== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.show {
      visibility: visible;
      opacity: 1;
    }
    .modal-content {
      background: rgba(255, 250, 245, 0.3);
      backdrop-filter: blur(30px) saturate(180%);
      border-radius: 64px;
      max-width: 560px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px 28px;
      box-shadow: 0 30px 60px -15px #00000070;
      border: 1px solid rgba(255, 255, 255, 0.4);
      position: relative;
      color: #2e293a;
    }
    .modal-close {
      position: absolute;
      top: 24px;
      right: 28px;
      font-size: 2.2rem;
      line-height: 1;
      cursor: pointer;
      opacity: 0.7;
      transition: 0.1s;
      z-index: 10;
    }
    .modal-close:hover {
      opacity: 1;
    }

    /* 账户系统内部样式 */
    .account-modal .page {
      display: none;
      animation: fadeUp 0.3s ease;
    }
    .account-modal .page.active {
      display: block;
    }
    @keyframes fadeUp {
      0% { opacity: 0.3; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .account-modal .field {
      margin-bottom: 20px;
    }
    .account-modal label {
      font-weight: 500;
      font-size: 0.95rem;
      color: inherit;
      margin-bottom: 6px;
      display: block;
    }
    .account-modal input {
      width: 100%;
      padding: 14px 18px;
      font-size: 1rem;
      background: rgba(255,255,255,0.5);
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 40px;
      outline: none;
      transition: 0.2s;
      color: #0b1a33;
      backdrop-filter: blur(4px);
    }
    .account-modal input:focus {
      border-color: #3366ff;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 0 4px rgba(51,102,255,0.2);
    }
    .account-modal button {
      width: 100%;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 600;
      background: #13294b;
      color: white;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.3);
      margin-top: 8px;
      box-shadow: 0 8px 16px -6px rgba(0,35,70,0.2);
      backdrop-filter: blur(4px);
    }
    .account-modal button:hover {
      background: #1e3a6b;
      transform: scale(1.01);
    }
    .account-modal button.secondary {
      background: rgba(255,255,255,0.5);
      color: #13294b;
      border: 1.5px solid rgba(255,255,255,0.8);
      box-shadow: none;
    }
    .account-modal .button-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .account-modal .button-group button {
      flex: 1;
      margin: 0;
    }
    .account-modal .info-row {
      background: rgba(240, 247, 255, 0.3);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 20px;
      margin: 24px 0 16px;
      border: 1px solid rgba(255,255,255,0.4);
    }
    .account-modal .info-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed rgba(191, 211, 240, 0.6);
    }
    .account-modal .info-item:last-child {
      border-bottom: none;
    }
    .account-modal .info-label {
      font-weight: 500;
      color: inherit;
    }
    .account-modal .info-value {
      font-weight: 600;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(4px);
      padding: 4px 16px;
      border-radius: 40px;
      color: #0b1a33;
    }
    .account-modal .current-user-info {
      background: rgba(223, 233, 249, 0.3);
      backdrop-filter: blur(8px);
      padding: 12px 18px;
      border-radius: 60px;
      margin-bottom: 24px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.5);
    }
    .account-modal .strength-meter {
      display: flex;
      gap: 10px;
      margin: 16px 0 20px;
    }
    .account-modal .strength-segment {
      flex: 1;
      height: 8px;
      background: rgba(200,200,200,0.3);
      backdrop-filter: blur(4px);
      border-radius: 12px;
      transition: 0.2s;
    }
    .account-modal .strength-segment.active-gray { background: #98a9bc; }
    .account-modal .strength-segment.active-red { background: #f05454; }
    .account-modal .strength-segment.active-yellow { background: #f7d44a; }
    .account-modal .strength-segment.active-green { background: #3eb489; }
    .account-modal .emoji-warning {
      color: #d34f4f;
      font-size: 0.9rem;
      margin: -10px 0 12px 12px;
      display: none;
    }
    .account-modal .home-links {
      display: flex;
      justify-content: space-between;
      margin: 16px 0 10px;
    }
    .account-modal .home-links a {
      color: #3366ff;
      text-decoration: none;
      font-weight: 500;
    }
    .account-modal .small-note {
      text-align: center;
      margin-top: 20px;
      color: inherit;
      opacity: 0.7;
    }
    .account-modal .user-switch-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(224, 236, 255, 0.6);
    }
    .account-modal .user-switch-item button {
      width: auto;
      padding: 6px 20px;
      margin: 0;
    }
    .account-modal .switch-pwd-field {
      margin-top: 10px;
      display: none;
    }
    .account-modal .switch-pwd-field.show {
      display: block;
    }

    /* 响应式 */
    @media (max-width: 700px) {
      .glass-card { padding: 2rem 1.8rem; }
      h1 { font-size: 3rem; }
      .title-gap { width: 0.4rem; }
      .title-row { flex-direction: column; align-items: flex-start; }
      .action-icons { align-self: flex-end; margin-top: -0.5rem; }
      .notice-board { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 480px) {
      h1 { font-size: 2.6rem; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="rainbow-stripe"></div>
  <div class="glow-lite-1"></div>
  <div class="glow-lite-2"></div>

  <main class="glass-card">
    <!-- 标题行 + 地球语言切换 + 账户图标 -->
    <div class="title-row">
      <h1>
        <span>𝓑𝓘𝓐𝓝</span>
        <span class="title-gap"></span>
        <span>𝓢𝓽𝓾𝓭𝓲𝓸</span>
      </h1>

      <div class="action-icons">
        <!-- 账户图标，点击打开模态框 -->
        <div class="account-icon" id="accountIcon">
          <i class="fa-regular fa-user"></i>
        </div>
        <!-- 地球语言下拉 -->
        <div class="lang-dropdown" id="langDropdown">
          <div class="lang-btn-globe" id="globeButton">
            <i class="fa-solid fa-earth-asia"></i>
            <span id="currentLangAbbr">CN</span>
            <i class="fa-solid fa-chevron-down" style="font-size: 0.9rem; opacity: 0.7;"></i>
          </div>
          <div class="lang-options" id="langOptions">
            <button class="lang-option" data-lang="en">EN</button>
            <button class="lang-option" data-lang="ja">JP</button>
            <button class="lang-option" data-lang="zhTW">TW</button>
            <button class="lang-option" data-lang="zhCN">CN</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 通告栏：多语言动态内容 -->
    <div class="notice-board">
      <i class="fa-regular fa-bell"></i>
      <div class="notice-text" id="noticeText"></div>
    </div>

    <!-- 副标题/标语 (多语言动态) -->
    <div class="tagline">
      <i class="fa-regular fa-star"></i>
      <span id="taglineText" class="dynamic-text">灵感 · 创作 · 存档</span>
      <i class="fa-regular fa-star"></i>
    </div>

    <!-- 个人作品 + 联系方式 双栏 -->
    <div class="sections-row">
      <!-- 个人作品卡片 - 多语言“暂无” -->
      <div class="info-card">
        <h3><i class="fa-regular fa-image"></i> 个人作品</h3>
        <ul class="works-list">
          <li><i class="fa-regular fa-folder-open"></i> <span id="worksNone" class="dynamic-text">暂无</span></li>
        </ul>
      </div>
      <!-- 联系方式卡片 (仅B站主页和邮箱) -->
      <div class="info-card">
        <h3><i class="fa-regular fa-address-card"></i> 联系方式</h3>
        <ul class="contact-list">
          <li><i class="fa-brands fa-bilibili"></i> <a href="https://space.bilibili.com/3494369476741704" target="_blank">哔哩哔哩个人主页</a></li>
          <li><i class="fa-regular fa-envelope"></i> <a href="mailto:small@bian.email.cn">small@bian.email.cn</a></li>
        </ul>
      </div>
    </div>

    <!-- 脚注 (多语言动态) -->
    <div class="foot-lite">
      <i class="fa-regular fa-heart"></i>
      <span id="footerText" class="dynamic-text">感谢来访</span>
      <i class="fa-regular fa-compass"></i>
    </div>
  </main>

  <!-- 账户模态框 (精简版，无检测/主题，直接登录页) -->
  <div class="modal-overlay" id="accountModalOverlay">
    <div class="modal-content account-modal" id="accountModalContent">
      <span class="modal-close" id="accountModalClose">&times;</span>
      
      <!-- 登录页 (默认显示) -->
      <div id="acc_page_home" class="page active">
        <div class="current-user-info" id="acc_currentUserDisplay">当前未登录</div>
        <div class="field">
          <label>账号</label>
          <input type="text" id="acc_login_username" placeholder="输入已注册账号">
        </div>
        <div class="field">
          <label>密码</label>
          <input type="password" id="acc_login_password" placeholder="输入密码">
        </div>
        <div class="home-links">
          <a href="#" id="acc_forgot_pwd_link">忘记密码？</a>
          <a href="#" id="acc_go_to_register">注册新账号</a>
        </div>
        <button id="acc_login_btn">登录</button>
        <button class="secondary" id="acc_guest_login_btn" style="margin-top: 12px;">👤 游客登录</button>
        <hr style="margin: 24px 0 16px; border: none; height: 1px; background: rgba(255,255,255,0.3);">
        <div style="display: flex; gap: 12px;">
          <button class="secondary" id="acc_home_exit_btn">退出模态框</button>
          <button class="secondary" id="acc_home_refresh">清空输入</button>
        </div>
        <div class="small-note" id="acc_login_message"></div>
      </div>

      <!-- 注册第一步 -->
      <div id="acc_page_reg_1" class="page">
        <div style="font-size: 1.4rem; font-weight: 600; margin-bottom: 24px;">📝 设置账户名</div>
        <div class="field">
          <label>账户名称</label>
          <input type="text" id="acc_reg_username" placeholder="例如: kai_2025">
        </div>
        <div class="button-group">
          <button class="secondary" id="acc_reg1_back_to_home">‹ 返回</button>
          <button id="acc_reg1_next">继续</button>
        </div>
      </div>

      <!-- 注册第二步 -->
      <div id="acc_page_reg_2" class="page">
        <div style="font-size: 1.4rem; font-weight: 600; margin-bottom: 24px;">🔑 创建密码</div>
        <div class="field">
          <label>密码</label>
          <input type="password" id="acc_reg_pwd1" placeholder="至少6位，包含字母和数字">
        </div>
        <div class="password-rule">📋 至少6字符，含字母+数字，无表情符号</div>
        <div class="strength-meter" id="acc_strength_meter_reg">
          <div class="strength-segment" id="acc_reg_seg1"></div>
          <div class="strength-segment" id="acc_reg_seg2"></div>
          <div class="strength-segment" id="acc_reg_seg3"></div>
          <div class="strength-segment" id="acc_reg_seg4"></div>
        </div>
        <div class="emoji-warning" id="acc_reg_emoji_warning">⚠️ 不能包含表情符号</div>
        <div class="field">
          <label>再次输入密码</label>
          <input type="password" id="acc_reg_pwd2" placeholder="确认密码">
        </div>
        <div class="button-group">
          <button class="secondary" id="acc_reg2_back">‹ 返回</button>
          <button id="acc_reg2_next">继续</button>
        </div>
      </div>

      <!-- 注册第三步 (确认信息) -->
      <div id="acc_page_reg_3" class="page">
        <div style="font-size: 1.4rem; font-weight: 600; margin-bottom: 24px;">👀 确认信息</div>
        <div class="info-row">
          <div class="info-item"><span class="info-label">账户</span><span class="info-value" id="acc_display_username">---</span></div>
          <div class="info-item"><span class="info-label">密码</span><span class="info-value" id="acc_display_pwd_masked">••••••</span></div>
        </div>
        <div class="show-pwd-area" style="display: flex; align-items: center; gap: 12px; margin: 16px 0;">
          <input type="checkbox" id="acc_showPwdCheckbox" style="width: 20px; height: 20px;">
          <label for="acc_showPwdCheckbox" style="margin:0;">显示密码</label>
        </div>
        <div style="background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); border-radius: 40px; padding: 12px 20px; margin-bottom: 24px;">
          <span id="acc_pwd_plaintext" style="font-family: monospace; font-weight:600;"></span>
        </div>
        <div class="button-group">
          <button class="secondary" id="acc_reg3_back">✎ 修改</button>
          <button id="acc_reg3_confirm">✓ 确定注册</button>
        </div>
      </div>

      <!-- 注册成功页 -->
      <div id="acc_page_reg_success" class="page">
        <div style="text-align: center; padding: 20px 0;">
          <div style="font-size: 5rem;">🎉</div>
          <div style="font-size: 2.2rem; font-weight: 700; margin: 16px 0 8px;">注册成功！</div>
          <p style="color: inherit; opacity:0.8;">您的账户已保存，关闭页面不会丢失。</p>
          <hr style="margin: 28px 0; border: none; height: 1px; background: rgba(255,255,255,0.3);">
          <div class="button-group" style="flex-wrap: wrap;">
            <button class="secondary" id="acc_reg_success_home">🏠 主页</button>
            <button class="secondary" id="acc_reg_success_again">🔄 再次注册</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ========== 原有页面多语言 ==========
      const i18n = {
        en: {
          notice: "<strong>Attention!</strong> This website does not have any manually written code, but is the personal studio homepage generated by DeepSeek Deep Thinking R1. If there is any infringement, please contact us to delete the homepage contact information in the html file.",
          tagline: "Inspiration · Creation · Archive",
          worksNone: "None",
          footer: "Thanks for visiting"
        },
        ja: {
          notice: "<strong>注意！</strong> このウェブサイトは手動で書かれたコードは一切なく、DeepSeek Deep Thinking R1によって生成された個人スタジオのホームページです。もし侵害があれば、HTMLファイル内の連絡先を削除するようご連絡ください。",
          tagline: "インスピレーション · 創作 · アーカイブ",
          worksNone: "なし",
          footer: "ご訪問ありがとうございます"
        },
        zhTW: {
          notice: "<strong>注意！</strong> 本網站沒有任何手動編寫的程式碼，而是由DeepSeek Deep Thinking R1生成的個人工作室首頁，如有侵權行為，請聯絡我們刪除首頁HTML檔案中的聯絡方式。",
          tagline: "靈感 · 創作 · 存檔",
          worksNone: "暫無",
          footer: "感謝來訪"
        },
        zhCN: {
          notice: "<strong>注意！</strong> 本网站没有任何手动编写的代码，而是由DeepSeek Deep Thinking R1生成的个人工作室主页，如有侵权行为，请联系我们删除主页HTML文件中的联系方式。",
          tagline: "灵感 · 创作 · 存档",
          worksNone: "暂无",
          footer: "感谢来访"
        }
      };
      const abbrMap = { en: 'EN', ja: 'JP', zhTW: 'TW', zhCN: 'CN' };
      const noticeDiv = document.getElementById('noticeText');
      const taglineSpan = document.getElementById('taglineText');
      const worksNoneSpan = document.getElementById('worksNone');
      const footerSpan = document.getElementById('footerText');
      const currentLangAbbr = document.getElementById('currentLangAbbr');
      const globeButton = document.getElementById('globeButton');
      const langOptions = document.getElementById('langOptions');
      const optionButtons = document.querySelectorAll('.lang-option');
      let currentLang = 'zhCN';
      let menuOpen = false;
      function toggleMenu(show) {
        if (show) { langOptions.classList.add('show'); menuOpen = true; }
        else { langOptions.classList.remove('show'); menuOpen = false; }
      }
      globeButton.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(!menuOpen); });
      document.addEventListener('click', (e) => {
        if (!globeButton.contains(e.target) && !langOptions.contains(e.target)) toggleMenu(false);
      });
      function setLanguage(lang) {
        if (!i18n[lang]) return;
        const texts = i18n[lang];
        [noticeDiv, taglineSpan, worksNoneSpan, footerSpan].forEach(el => el.style.opacity = '0');
        setTimeout(() => {
          noticeDiv.innerHTML = texts.notice;
          taglineSpan.textContent = texts.tagline;
          worksNoneSpan.textContent = texts.worksNone;
          footerSpan.textContent = texts.footer;
          currentLangAbbr.textContent = abbrMap[lang] || 'CN';
          optionButtons.forEach(btn => {
            const btnLang = btn.getAttribute('data-lang');
            btn.classList.toggle('active-lang', btnLang === lang);
          });
          [noticeDiv, taglineSpan, worksNoneSpan, footerSpan].forEach(el => el.style.opacity = '1');
          currentLang = lang;
        }, 150);
        toggleMenu(false);
      }
      optionButtons.forEach(btn => {
        btn.addEventListener('click', (e) => { const lang = e.target.getAttribute('data-lang'); setLanguage(lang); });
      });
      setLanguage('zhCN');

      // ========== 账户模态框逻辑 (精简，无检测/主题) ==========
      const modalOverlay = document.getElementById('accountModalOverlay');
      const modalClose = document.getElementById('accountModalClose');
      const accountIcon = document.getElementById('accountIcon');

      // 打开/关闭模态框
      accountIcon.addEventListener('click', () => {
        modalOverlay.classList.add('show');
        // 每次打开默认回到登录页
        showPage('home');
      });
      modalClose.addEventListener('click', () => {
        modalOverlay.classList.remove('show');
      });
      modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove('show');
      });

      // 账户数据
      const STORAGE_KEY = 'registered_users';
      const GUEST_USERNAME = 'demo';
      const GUEST_PASSWORD = 'demo123';

      function loadUsers() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
      function saveUsers(users) { localStorage.setItem(STORAGE_KEY, JSON.stringify(users)); }

      let users = loadUsers();
      if (!users.some(u => u.username === GUEST_USERNAME)) {
        users.push({ username: GUEST_USERNAME, password: GUEST_PASSWORD });
        saveUsers(users);
      }
      let currentUsername = null;

      // 页面元素
      const pages = {
        home: document.getElementById('acc_page_home'),
        reg1: document.getElementById('acc_page_reg_1'),
        reg2: document.getElementById('acc_page_reg_2'),
        reg3: document.getElementById('acc_page_reg_3'),
        regSuccess: document.getElementById('acc_page_reg_success')
      };
      function showPage(pageId) {
        Object.values(pages).forEach(p => p.classList.remove('active'));
        if (pages[pageId]) pages[pageId].classList.add('active');
      }

      function updateHomeUserInfo() {
        const el = document.getElementById('acc_currentUserDisplay');
        if (el) el.innerText = currentUsername ? `当前登录：${currentUsername}` : '当前未登录';
      }

      // 绑定事件
      const loginUsername = document.getElementById('acc_login_username');
      const loginPassword = document.getElementById('acc_login_password');
      const loginMsg = document.getElementById('acc_login_message');

      document.getElementById('acc_login_btn').addEventListener('click', () => {
        const user = loginUsername.value.trim();
        const pwd = loginPassword.value;
        if (!user || !pwd) { loginMsg.innerText = '请输入账号和密码'; return; }
        const found = users.find(u => u.username === user && u.password === pwd);
        if (found) {
          currentUsername = user;
          updateHomeUserInfo();
          loginMsg.innerText = `✅ 欢迎，${user}！`;
          loginMsg.style.color = 'green';
        } else {
          loginMsg.innerText = '❌ 账号或密码错误';
          loginMsg.style.color = '#b00020';
        }
      });

      document.getElementById('acc_guest_login_btn').addEventListener('click', () => {
        if (!users.some(u => u.username === GUEST_USERNAME)) {
          users.push({ username: GUEST_USERNAME, password: GUEST_PASSWORD });
          saveUsers(users);
        }
        loginUsername.value = GUEST_USERNAME;
        loginPassword.value = GUEST_PASSWORD;
        document.getElementById('acc_login_btn').click();
      });

      document.getElementById('acc_forgot_pwd_link').addEventListener('click', e => { e.preventDefault(); alert('🔑 请联系管理员重置密码 (模拟)'); });
      document.getElementById('acc_go_to_register').addEventListener('click', e => { e.preventDefault(); showPage('reg1'); });
      document.getElementById('acc_home_exit_btn').addEventListener('click', () => { modalOverlay.classList.remove('show'); });
      document.getElementById('acc_home_refresh').addEventListener('click', () => { loginUsername.value = ''; loginPassword.value = ''; if(loginMsg) loginMsg.innerText = ''; });

      // 密码强度检测
      function containsEmoji(str) {
        const emojiRegex = /[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F900}-\u{1F9FF}]/u;
        return emojiRegex.test(str);
      }
      function getStrengthLevel(pwd) {
        if (!pwd || pwd.length < 6 || !/[a-zA-Z]/.test(pwd) || !/[0-9]/.test(pwd) || containsEmoji(pwd)) return 1;
        let score = 0;
        if (pwd.length >= 12) score += 3; else if (pwd.length >= 8) score += 2; else score += 1;
        const hasLower = /[a-z]/.test(pwd);
        const hasUpper = /[A-Z]/.test(pwd);
        const hasDigit = /[0-9]/.test(pwd);
        const hasSymbol = /[^a-zA-Z0-9]/.test(pwd);
        let typeCount = 0;
        if (hasLower) typeCount++; if (hasUpper) typeCount++; if (hasDigit) typeCount++; if (hasSymbol) typeCount++;
        if (typeCount >= 4) score += 3; else if (typeCount === 3) score += 2; else if (typeCount === 2) score += 1;
        if (score <= 2) return 2; else if (score <= 4) return 3; else return 4;
      }
      function updateStrengthMeter(pwdInput, segIds, warningId) {
        const pwd = pwdInput.value;
        const level = getStrengthLevel(pwd);
        const warningEl = document.getElementById(warningId);
        if (warningEl) warningEl.style.display = containsEmoji(pwd) ? 'block' : 'none';
        const segs = segIds.map(id => document.getElementById(id));
        segs.forEach(s => s.className = 'strength-segment');
        if (level === 1) segs.forEach(s => s.classList.add('active-gray'));
        else if (level === 2) { segs[0].classList.add('active-red'); segs[1].classList.add('active-red'); }
        else if (level === 3) { segs[0].classList.add('active-yellow'); segs[1].classList.add('active-yellow'); segs[2].classList.add('active-yellow'); }
        else segs.forEach(s => s.classList.add('active-green'));
      }

      const regPwd1 = document.getElementById('acc_reg_pwd1');
      regPwd1.addEventListener('input', () => updateStrengthMeter(regPwd1, ['acc_reg_seg1','acc_reg_seg2','acc_reg_seg3','acc_reg_seg4'], 'acc_reg_emoji_warning'));

      document.getElementById('acc_reg1_back_to_home').addEventListener('click', () => showPage('home'));
      document.getElementById('acc_reg1_next').addEventListener('click', () => {
        const username = document.getElementById('acc_reg_username').value.trim();
        if (!username) { alert('请输入账户名称'); return; }
        if (username === GUEST_USERNAME) { alert(`用户名不能为 "${GUEST_USERNAME}"`); return; }
        if (users.some(u => u.username === username)) { alert('该用户名已存在'); return; }
        window.regTemp = { username };
        showPage('reg2');
      });
      document.getElementById('acc_reg2_back').addEventListener('click', () => {
        if (window.regTemp) document.getElementById('acc_reg_username').value = window.regTemp.username;
        showPage('reg1');
      });
      document.getElementById('acc_reg2_next').addEventListener('click', () => {
        const pwd1 = regPwd1.value;
        const pwd2 = document.getElementById('acc_reg_pwd2').value;
        if (!pwd1 || pwd1.length < 6 || !/[a-zA-Z]/.test(pwd1) || !/[0-9]/.test(pwd1)) { alert('密码必须至少6位且包含字母和数字'); return; }
        if (containsEmoji(pwd1)) { alert('密码不能包含表情符号'); return; }
        if (pwd1 !== pwd2) { alert('两次密码不一致'); return; }
        window.regTemp.password = pwd1;
        document.getElementById('acc_display_username').innerText = window.regTemp.username;
        document.getElementById('acc_display_pwd_masked').innerText = '•'.repeat(pwd1.length);
        document.getElementById('acc_pwd_plaintext').innerText = pwd1;
        document.getElementById('acc_showPwdCheckbox').checked = false;
        document.getElementById('acc_pwd_plaintext').style.display = 'none';
        showPage('reg3');
      });
      document.getElementById('acc_showPwdCheckbox').addEventListener('change', function() {
        const plain = document.getElementById('acc_pwd_plaintext');
        const masked = document.getElementById('acc_display_pwd_masked');
        if (this.checked) { plain.style.display = 'inline'; masked.style.display = 'none'; }
        else { plain.style.display = 'none'; masked.style.display = 'inline'; }
      });
      document.getElementById('acc_reg3_back').addEventListener('click', () => {
        if (window.regTemp) document.getElementById('acc_reg_username').value = window.regTemp.username;
        document.getElementById('acc_reg_pwd1').value = ''; document.getElementById('acc_reg_pwd2').value = '';
        showPage('reg1');
      });
      document.getElementById('acc_reg3_confirm').addEventListener('click', () => {
        if (!window.regTemp?.username || !window.regTemp?.password) { alert('信息不完整'); showPage('reg1'); return; }
        users.push({ username: window.regTemp.username, password: window.regTemp.password });
        saveUsers(users);
        window.regTemp = null;
        document.getElementById('acc_reg_username').value = '';
        document.getElementById('acc_reg_pwd1').value = ''; document.getElementById('acc_reg_pwd2').value = '';
        showPage('regSuccess');
      });
      document.getElementById('acc_reg_success_home').addEventListener('click', () => showPage('home'));
      document.getElementById('acc_reg_success_again').addEventListener('click', () => showPage('reg1'));

      // 初始化用户信息显示
      updateHomeUserInfo();
    })();
  </script>
</body>
</html>
